                    const __emulator‌Loaded = document.getElementById('emulator‌Loaded');

                        const flag = EJS_player && EJS_core && EJS_color && EJS_pathtodata && EJS_gameUrl && EJS_gameName;
                        if (flag) {
                            __emulator‌Loaded.style.display = "block";
                            clearInterval(__timer);

                    }
                    , 500)

                    EJS_player = player;
                    EJS_core = core;
                    EJS_color = color;
                    EJS_pathtodata = pathtodata;
                    EJS_gameUrl = gameUrl;
                    EJS_gameName = gameName;
                }
                function loaderJS() {
                    const __loaderJS = document.getElementById("loaderJS");
                    if (!__loaderJS) {
                        const __s = document.createElement("script");
                        __s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                        __s.id = "loaderJS";
                        document.querySelector("body").appendChild(__s);
                    }
                }

                    const value = sidebarSelect.value;
                    setEJSData(_EJS.player, _EJS.core, _EJS.color, _EJS.pathtodata, GAMES[value].url, GAMES[value].gameName);
                    loaderJS();
                    emulator‌Loaded();

                                    }

                uploadfile.addEventListener('change', function(e) {

                    const file = e.target.files[0];
                    console.log(file)
                    if (!file)
                        return;

                    const reader = new FileReader();
                    // 只读取前4个字节，节省内存
                    reader.readAsArrayBuffer(file.slice(0, 4));

                    reader.onload = function() {
                        const view = new Uint8Array(this.result);
                        // 比较十六进制: 0x4E, 0x45, 0x53, 0x1A
                        if (view.length === 4 && view[0] === 0x4E && view[1] === 0x45 && view[2] === 0x53 && view[3] === 0x1A) {
                            console.log('校验通过');
                            upLoadClick(file)
                        } else {
                            alert('上传文件必须为NES 文件');
                        }
                    }
                    ;
                });

                function showSidebar() {

                    sidebar.classList.add('hidden-sidebar');
                    sidebarVisible = false;

                function toggleSidebar() {
                    if (sidebarVisible) {

                    } else {
                        showSidebar();
                    }
